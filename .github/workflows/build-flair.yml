name: Build Mars for FLAIR signatures

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: |
          ls /Applications/ | grep Xcode
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version
          clang --version

      - name: Build Mars using official build_osx.py
        run: |
          cd mars
          python3 build_osx.py 1

      - name: Package artifacts
        run: |
          mkdir -p /tmp/mars_out

          # Copy .a libraries
          cp mars/cmake_build/OSX/Darwin.out/*.a /tmp/mars_out/ 2>/dev/null || true
          cp mars/cmake_build/OSX/zstd/libzstd.a /tmp/mars_out/ 2>/dev/null || true

          # Also extract .o from each .a and copy
          mkdir -p /tmp/mars_out/objects
          cd /tmp/mars_out/objects
          for a in /tmp/mars_out/*.a; do
            name=$(basename "$a" .a)
            mkdir -p "$name" && cd "$name"
            ar -x "$a"
            cd ..
          done

          echo "=== .a files ==="
          ls -lh /tmp/mars_out/*.a
          echo "=== .o files count ==="
          find /tmp/mars_out/objects -name "*.o" | wc -l

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mars-official-build
          path: /tmp/mars_out/
          retention-days: 7
